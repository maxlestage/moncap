name: iOS TestFlight

# Archive l'app iOS et l'envoie sur TestFlight depuis un runner macOS, avec
# les outils Apple natifs (xcodebuild + altool), sans fastlane. Le certificat
# de distribution et le profil App Store sont générés en ligne via l'API
# App Store Connect — aucun Mac ni certificat à fournir.
# - Automatique : à chaque push sur `master` touchant l'app iOS.
# - Manuel : onglet Actions → Run workflow.
# - Tag : en poussant un tag `ios-v*`.

on:
  push:
    branches: ["master"]
    paths:
      - "frontend/MonCapGPS/**"
      - "frontend/MonCapGPS.xcodeproj/**"
      - "frontend/scripts/**"
      - ".github/workflows/ios-testflight.yml"
    tags: ["ios-v*"]
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

env:
  BUNDLE_ID: com.maxlestage.moncap
  TEAM_ID: 2FW8T4UX4L

jobs:
  testflight:
    name: Build & upload TestFlight
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Seuls les secrets App Store Connect sont nécessaires (le reste est
      # généré en ligne). Sans eux, on s'arrête proprement.
      - name: Vérifie la présence des secrets
        id: guard
        working-directory: .
        run: |
          if [ -n "${{ secrets.ASC_KEY_ID }}" ] && [ -n "${{ secrets.ASC_ISSUER_ID }}" ] && [ -n "${{ secrets.ASC_KEY_P8 }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Secrets App Store Connect présents ✅"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets absents — build TestFlight ignoré. Requis : ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8."
          fi

      - name: Sélectionne Xcode (dernière version stable)
        if: steps.guard.outputs.ready == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Python
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Génère le certificat et le profil (API App Store Connect)
        if: steps.guard.outputs.ready == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          python -m pip install --quiet requests "pyjwt[crypto]"
          python scripts/asc_signing.py

      - name: Installe le certificat et le profil
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          KPWD="$(uuidgen)"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"

          # Intermédiaire Apple WWDR (chaîne de signature complète). Non bloquant :
          # l'intermédiaire est en général déjà présent sur le runner.
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
            -o "$RUNNER_TEMP/wwdr.cer" || true
          security import "$RUNNER_TEMP/wwdr.cer" -k "$KEYCHAIN" -A || true

          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KPWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/pp.plist"
          UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/pp.plist")"
          cp "$PP_PATH" "$PROFILES/$UUID.mobileprovision"

      - name: Archive
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -euo pipefail
          xcodebuild -project MonCapGPS.xcodeproj -scheme MonCapGPS \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/MonCapGPS.xcarchive" \
            CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            clean archive

      - name: Exporte l'IPA
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>$BUNDLE_ID</key><string>$PROFILE_NAME</string></dict>
            <key>destination</key><string>export</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MonCapGPS.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Envoie sur TestFlight
        if: steps.guard.outputs.ready == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -euo pipefail
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          if printf '%s' "$ASC_KEY_P8" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s' "$ASC_KEY_P8" > "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          else
            printf '%s' "$ASC_KEY_P8" | base64 --decode > "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          fi
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)"
          echo "Envoi de $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
