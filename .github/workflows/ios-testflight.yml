name: iOS TestFlight

# Archive l'app iOS et l'envoie sur TestFlight depuis un runner macOS.
# - Automatique : à chaque push sur `master` touchant l'app iOS.
# - Manuel : onglet Actions → Run workflow.
# - Tag : en poussant un tag `ios-v*`.

on:
  push:
    branches: ["master"]
    paths:
      - "frontend/MonCapGPS/**"
      - "frontend/MonCapGPS.xcodeproj/**"
      - "frontend/fastlane/**"
      - "frontend/Gemfile"
      - ".github/workflows/ios-testflight.yml"
    tags: ["ios-v*"]
  workflow_dispatch:

# Sérialise les envois : jamais deux uploads en parallèle (évite les
# collisions de numéro de build). On ne coupe pas un envoi en cours.
concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build & upload TestFlight
    runs-on: macos-14
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Sans les secrets App Store Connect, on s'arrête proprement (pas d'échec
      # rouge) — utile tant que les secrets ne sont pas encore configurés.
      # Le contenu de la clé .p8 est lu depuis ASC_KEY_P8.
      - name: Vérifie la présence des secrets
        id: guard
        working-directory: .
        run: |
          if [ -n "${{ secrets.ASC_KEY_ID }}" ] && [ -n "${{ secrets.ASC_ISSUER_ID }}" ] && [ -n "${{ secrets.ASC_KEY_P8 }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Les 3 secrets attendus sont présents ✅"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets App Store Connect absents — build TestFlight ignoré. Attendus : ASC_KEY_ID / ASC_ISSUER_ID / ASC_KEY_P8."
          fi

      - name: Sélectionne Xcode (dernière version stable)
        if: steps.guard.outputs.ready == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ruby + bundler (fastlane)
        if: steps.guard.outputs.ready == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: frontend

      - name: Archive et upload TestFlight
        if: steps.guard.outputs.ready == 'true'
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_P8 }}
